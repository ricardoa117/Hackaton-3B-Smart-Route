<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vista de Tienda - Hackathon</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Global CSS -->
    <link rel="stylesheet" href="../css/global.css">
    <!-- Tienda CSS -->
    <link rel="stylesheet" href="../css/tienda.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-danger">
        <div class="container">
            <a class="navbar-brand" href="./index.html">🚚 Tiendas 3B</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="./logistica.html">📍 Logística</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="./tienda.html">🏪 Tienda</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="tienda-container">
        <div class="row w-100 h-100 align-items-center">
            <!-- Izquierda: Card de Tienda -->
            <div class="col-lg-6 col-md-12 d-flex justify-content-center align-items-center p-4">
                <div class="card tienda-card shadow-lg w-100">
                    <div class="card-body">
                        <h1 class="mb-4">🏪 Vista de Tienda</h1>

                        <div class="mb-4 text-start">
                            <label for="storeSelector" class="form-label text-dark fw-bold">Selecciona tu Sucursal:</label>
                            <select id="storeSelector" class="form-select form-select-lg border-danger">
                                <option value="">-- Elige una tienda --</option>
                            </select>
                        </div>

                        <div id="semaforo" class="semaforo bg-secondary"></div>

                        <div class="tienda-info mt-3">
                            <h3 id="estado-texto" class="text-dark fw-bold">Esperando selección...</h3>
                            <div class="mt-3" id="info-ruta" style="display: none;">
                                <p class="fs-4 text-dark">Faltan <strong id="restante" class="text-danger fs-1">0</strong> tiendas para tu entrega</p>
                                <p class="text-muted">Turno en la ruta: <span id="parada">0</span></p>
                            </div>
                        </div>

                        <button id="pedidoBtn" class="btn btn-success btn-pedido mt-4 w-100" disabled>
                            ✓ Confirmar Recepción
                        </button>
                    </div>
                </div>
            </div>

            <!-- Derecha: Zona para Imagen -->
            <div class="col-lg-6 col-md-12 d-flex justify-content-center align-items-center p-4">
                <div class="tienda-imagen-container">
                    <img id="tienda-imagen" src="../images/coche.png" alt="Imagen de Tienda" class="tienda-imagen">
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Utils JS -->
    <script src="../js/utils.js"></script>
    <!-- Tienda JS -->
    <script src="../js/tienda.js"></script>
</body>
</html>
